<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dictionarius</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Accessibility: skip link -->
    <a href="#search-input" class="skip-link">Skip to search</a>

    <!-- Screen-reader announcements -->
    <div class="sr-only" aria-live="polite" id="live-region"></div>

    <!-- Mobile Header -->
    <header class="mobile-header">
      <button
        id="mobile-menu-btn"
        class="mobile-menu-btn"
        aria-label="Open menu"
      >
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
      <span class="mobile-logo">Dictionarius</span>
      <div style="width: 40px"></div>
    </header>

    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar" role="navigation">
      <div class="sidebar-header">
        <button
          id="toggle-sidebar"
          class="icon-btn-toggle"
          title="Toggle Sidebar"
          aria-label="Toggle sidebar"
        >
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="9" y1="3" x2="9" y2="21"></line>
            <path class="toggle-arrow" d="M14 15l-3-3 3-3"></path>
          </svg>
        </button>
        <span class="logo-text">Dictionarius</span>
        <button
          id="close-sidebar-mobile"
          class="close-sidebar-mobile"
          aria-label="Close menu"
        >
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <nav class="sidebar-menu">
        <ul>
          <li class="menu-item active" data-action="home" title="History">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <span class="link-text">History</span>
          </li>
          <li class="menu-item" data-action="wotd" title="Word of the Day">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <polygon
                points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
              ></polygon>
            </svg>
            <span class="link-text">Word of Day</span>
          </li>
          <!-- NEW: Favorites -->
          <li class="menu-item" data-action="favorites" title="Favorites">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
              ></path>
            </svg>
            <span class="link-text">Favorites</span>
          </li>
          <li class="menu-item" data-action="index" title="Index (A-Z)">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            >
              <line x1="4" y1="7" x2="20" y2="7" />
              <line x1="4" y1="12" x2="20" y2="12" />
              <line x1="4" y1="17" x2="20" y2="17" />
            </svg>
            <span class="link-text">Index</span>
          </li>
        </ul>
      </nav>

      <div class="sidebar-footer">
        <div class="footer-item theme-row">
          <span class="link-text">Theme</span>
          <div class="theme-toggle-group">
            <button class="theme-btn" data-theme="system" title="System">
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                <line x1="8" y1="21" x2="16" y2="21"></line>
                <line x1="12" y1="17" x2="12" y2="21"></line>
              </svg>
            </button>
            <button class="theme-btn" data-theme="light" title="Light">
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              </svg>
            </button>
            <button class="theme-btn" data-theme="dark" title="Dark">
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"
                ></path>
              </svg>
            </button>
          </div>
        </div>
        <div class="footer-item profile">
          <div class="avatar-img"></div>
          <div class="profile-info">
            <span class="user-name">Guest</span>
            <span class="user-plan">Free</span>
          </div>
        </div>
        <div class="footer-item" title="Settings">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="3"></circle>
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"
            ></path>
          </svg>
          <span class="link-text">Settings</span>
        </div>
      </div>
    </aside>

    <!-- Index Overlay -->
    <div
      id="index-overlay"
      class="index-overlay"
      role="dialog"
      aria-modal="true"
    >
      <div class="index-header">
        <h2>Index</h2>
        <button
          class="close-overlay-btn"
          id="close-index-btn"
          aria-label="Close index"
        >
          &times;
        </button>
      </div>
      <div class="alphabet-nav" id="alphabet-nav"></div>
      <div class="index-content" id="index-content"></div>
    </div>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
      <section class="hero-section">
        <h1 class="headline">
          Expand your mind,<br />
          experience the <span class="pop-highlight">frontier</span>.
        </h1>
        <p class="search-hint">Press <kbd>Ctrl</kbd>+<kbd>K</kbd> to search</p>
        <div class="search-container">
          <form
            class="search-box"
            id="search-form"
            role="combobox"
            aria-expanded="false"
            aria-haspopup="listbox"
          >
            <svg
              class="search-icon"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input
              type="text"
              id="search-input"
              placeholder="Search for meaning…"
              autocomplete="off"
              aria-label="Search for a word"
              aria-autocomplete="list"
              aria-controls="suggestions-list"
            />
            <button type="submit" class="search-submit-btn" aria-label="Search">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
              </svg>
            </button>
          </form>
          <!-- NEW: Autocomplete suggestions -->
          <ul
            class="suggestions-list"
            id="suggestions-list"
            role="listbox"
            aria-label="Search suggestions"
          ></ul>
        </div>
      </section>

      <div id="main-definition" class="definition-wrapper hidden"></div>

      <section class="grid-section" id="grid-section">
        <div class="grid-header">
          <div class="custom-select-container">
            <button
              class="select-trigger"
              id="sort-trigger"
              aria-haspopup="listbox"
              aria-expanded="false"
            >
              <span id="current-sort">Recent First</span>
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <polyline points="6 9 12 15 18 9"></polyline>
              </svg>
            </button>
            <ul class="select-options" id="sort-options" role="listbox">
              <li
                class="option selected"
                data-value="recent"
                role="option"
                aria-selected="true"
              >
                Recent First
              </li>
              <li
                class="option"
                data-value="alpha"
                role="option"
                aria-selected="false"
              >
                Alphabetical (A-Z)
              </li>
              <li
                class="option"
                data-value="oldest"
                role="option"
                aria-selected="false"
              >
                Oldest First
              </li>
            </ul>
          </div>

          <div class="grid-actions">
            <!-- NEW: Clear history -->
            <button
              class="action-icon-btn"
              id="clear-history-btn"
              title="Clear all history"
              aria-label="Clear all history"
            >
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <polyline points="3 6 5 6 21 6"></polyline>
                <path
                  d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
                ></path>
              </svg>
            </button>
            <div class="action-divider"></div>
            <button
              class="view-btn active"
              id="btn-grid"
              data-view="grid"
              aria-label="Grid view"
              aria-pressed="true"
            >
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect x="3" y="3" width="7" height="7"></rect>
                <rect x="14" y="3" width="7" height="7"></rect>
                <rect x="14" y="14" width="7" height="7"></rect>
                <rect x="3" y="14" width="7" height="7"></rect>
              </svg>
            </button>
            <button
              class="view-btn"
              id="btn-list"
              data-view="list"
              aria-label="List view"
              aria-pressed="false"
            >
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              >
                <line x1="4" y1="7" x2="20" y2="7" />
                <line x1="4" y1="12" x2="20" y2="12" />
                <line x1="4" y1="17" x2="20" y2="17" />
              </svg>
            </button>
          </div>
        </div>

        <div id="cards-container" class="cards-grid"></div>
      </section>
    </main>

    <!-- NEW: Toast container -->
    <div class="toast-container" id="toast-container" aria-live="polite"></div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
